<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Stock Analyzer • TSLA • AMD • AAPL • NVDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .stock-card:hover { transform: translateY(-4px); }
        .chart-container { position: relative; height: 420px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-screen-2xl mx-auto">
        <nav class="bg-black border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">📈</div>
                <h1 class="title-font text-4xl tracking-tighter font-semibold">Grok Stock Analyzer</h1>
            </div>
            <button onclick="refreshAll()" class="flex items-center gap-2 bg-zinc-900 hover:bg-emerald-950 px-6 py-3 rounded-3xl text-sm font-medium">
                ⟳ Refresh All Data
            </button>
        </nav>

        <div class="flex">
            <!-- Sidebar -->
            <div class="w-80 bg-black border-r border-zinc-800 min-h-screen p-8">
                <h2 class="uppercase text-xs tracking-widest text-zinc-500 mb-4">Watchlist</h2>
                <div id="stock-list" class="space-y-4"></div>

                <div class="mt-16">
                    <h2 class="uppercase text-xs tracking-widest text-zinc-500 mb-4">Global Indices</h2>
                    <div id="global-indices" class="space-y-4"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-10">
                <div id="stock-header" class="flex justify-between mb-10">
                    <div>
                        <div class="flex items-center gap-4">
                            <h1 id="stock-name" class="title-font text-6xl font-bold">Loading...</h1>
                            <span id="stock-ticker" class="text-4xl font-mono text-zinc-400"></span>
                        </div>
                        <div id="current-price" class="text-6xl font-semibold mt-3"></div>
                        <div id="price-change" class="text-3xl mt-2"></div>
                    </div>
                    <div id="opinion-card" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-7 max-w-md">
                        <div class="uppercase text-emerald-400 text-sm font-semibold">Grok Opinion</div>
                        <p id="opinion-text" class="mt-4 text-zinc-300"></p>
                    </div>
                </div>

                <div class="bg-zinc-900 rounded-3xl p-8 mb-10">
                    <div class="flex justify-between mb-6">
                        <h3 class="text-xl font-semibold">Price Chart</h3>
                        <div class="flex gap-2">
                            <button onclick="changePeriod(this, '1mo')" class="period-btn active px-5 py-2 rounded-3xl bg-emerald-950">1M</button>
                            <button onclick="changePeriod(this, '3mo')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">3M</button>
                            <button onclick="changePeriod(this, '6mo')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">6M</button>
                            <button onclick="changePeriod(this, '1y')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">1Y</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="price-chart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Latest News</h3>
                        <div id="news-feed" class="space-y-6"></div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Key Metrics & Global Impact</h3>
                        <div id="metrics" class="grid grid-cols-2 gap-6"></div>
                        <div id="global-impact" class="mt-8 bg-black/70 rounded-2xl p-6 text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "YOUR_FINNHUB_API_KEY_HERE";   // ←←← PUT YOUR KEY HERE
        let currentTicker = 'TSLA';
        let currentChart = null;

        const watchlist = ['TSLA', 'AMD', 'AAPL', 'NVDA'];

        async function fetchFinnhub(endpoint) {
            const res = await fetch(`https://finnhub.io/api/v1/${endpoint}&token=${API_KEY}`);
            if (!res.ok) throw new Error('API error');
            return res.json();
        }

        async function renderWatchlist() {
            const container = document.getElementById('stock-list');
            container.innerHTML = '';
            for (let ticker of watchlist) {
                try {
                    const quote = await fetchFinnhub(`quote?symbol=${ticker}`);
                    const changePct = quote.dp || 0;
                    const isUp = changePct >= 0;

                    const html = `
                    <div onclick="selectStock('${ticker}')" class="bg-zinc-900 border ${isUp ? 'border-emerald-500' : 'border-red-500'} rounded-3xl p-5 cursor-pointer hover:border-emerald-400">
                        <div class="flex justify-between">
                            <div><strong>${ticker}</strong></div>
                            <div class="text-right">
                                <div class="font-semibold">$${quote.c.toFixed(2)}</div>
                                <div class="${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? '↑' : '↓'} ${changePct.toFixed(2)}%</div>
                            </div>
                        </div>
                    </div>`;
                    container.innerHTML += html;
                } catch(e) {}
            }
        }

        async function selectStock(ticker) {
            currentTicker = ticker;
            document.getElementById('stock-ticker').textContent = ticker;

            try {
                const quote = await fetchFinnhub(`quote?symbol=${ticker}`);
                document.getElementById('stock-name').textContent = ticker;
                document.getElementById('current-price').innerHTML = `$${quote.c.toFixed(2)}`;

                const changeEl = document.getElementById('price-change');
                const isUp = quote.dp >= 0;
                changeEl.innerHTML = `<span class="${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? '▲' : '▼'} ${quote.dp.toFixed(2)}%</span>`;

                // Simple opinion
                document.getElementById('opinion-text').textContent = quote.dp > 1 ? 
                    "Strong momentum today. Good entry for long-term AI/EV exposure." : 
                    "Healthy consolidation. Watch next macro catalyst.";

                // Render chart (Finnhub candle data can be added later if needed)
                renderChartPlaceholder();

            } catch(e) {
                alert("Failed to load data. Make sure you inserted your Finnhub API key correctly.");
            }
        }

        function renderChartPlaceholder() {
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById('price-chart');
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['Loading...'], datasets: [{ label: 'Price', data: [0], borderColor: '#10b981' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
            // Note: Full historical chart requires another Finnhub call - we can add it later
        }

        function changePeriod(btn, period) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active', 'bg-emerald-950'));
            btn.classList.add('active', 'bg-emerald-950');
            // You can expand this later with real data
        }

        async function refreshAll() {
            await renderWatchlist();
            await selectStock(currentTicker);
        }

        // Init
        window.onload = () => {
            if (API_KEY === "YOUR_FINNHUB_API_KEY_HERE") {
                alert("Please replace 'YOUR_FINNHUB_API_KEY_HERE' with your actual Finnhub key in the code!");
            }
            renderWatchlist();
            selectStock('TSLA');
        };
    </script>
</body>
</html>
