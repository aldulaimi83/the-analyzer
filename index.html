<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Stock Analyzer • TSLA • AMD • AAPL • NVDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .stock-card:hover { transform: translateY(-4px); }
        .chart-container { position: relative; height: 420px; }
        .rec-buy { background: linear-gradient(135deg, #10b981, #34d399); }
        .rec-hold { background: linear-gradient(135deg, #eab308, #facc15); }
        .rec-sell { background: linear-gradient(135deg, #ef4444, #f87171); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-screen-2xl mx-auto">
        <nav class="bg-black border-b border-zinc-800 px-8 py-5 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">📈</div>
                <h1 class="title-font text-4xl tracking-tighter font-semibold">Grok Stock Analyzer</h1>
            </div>
            <button onclick="refreshAll()" class="flex items-center gap-2 bg-zinc-900 hover:bg-emerald-950 px-6 py-3 rounded-3xl text-sm font-medium">⟳ Refresh All Data</button>
        </nav>

        <div class="flex">
            <!-- Sidebar -->
            <div class="w-80 bg-black border-r border-zinc-800 min-h-screen p-8">
                <h2 class="uppercase text-xs tracking-widest text-zinc-500 mb-4">Watchlist</h2>
                <div id="stock-list" class="space-y-4"></div>

                <div class="mt-16">
                    <h2 class="uppercase text-xs tracking-widest text-zinc-500 mb-4">Global Indices</h2>
                    <div id="global-indices" class="space-y-4"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-10">
                <div id="stock-header" class="flex justify-between items-start mb-10">
                    <div>
                        <div class="flex items-center gap-4">
                            <h1 id="stock-name" class="title-font text-6xl font-bold"></h1>
                            <span id="stock-ticker" class="text-4xl font-mono text-zinc-400"></span>
                        </div>
                        <div id="current-price" class="text-6xl font-semibold mt-3"></div>
                        <div id="price-change" class="text-3xl mt-2"></div>
                    </div>

                    <!-- Stock Recommendation -->
                    <div id="recommendation-card" class="w-96 rounded-3xl p-7 text-black shadow-2xl">
                        <div class="flex justify-between mb-4">
                            <div class="uppercase text-sm font-bold">GROK RECOMMENDATION</div>
                            <div id="rec-badge" class="px-6 py-1 text-sm font-bold rounded-3xl"></div>
                        </div>
                        <div id="rec-confidence" class="text-5xl font-bold mb-2"></div>
                        <p id="rec-reason" class="text-base"></p>
                    </div>
                </div>

                <!-- Real Chart -->
                <div class="bg-zinc-900 rounded-3xl p-8 mb-10 border border-zinc-800">
                    <div class="flex justify-between mb-6">
                        <h3 class="text-xl font-semibold">Live Price Chart</h3>
                        <div class="flex gap-2 text-sm">
                            <button onclick="changePeriod(this, '1mo')" class="period-btn active px-5 py-2 rounded-3xl bg-emerald-950">1M</button>
                            <button onclick="changePeriod(this, '3mo')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">3M</button>
                            <button onclick="changePeriod(this, '6mo')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">6M</button>
                            <button onclick="changePeriod(this, '1y')" class="period-btn px-5 py-2 rounded-3xl hover:bg-zinc-800">1Y</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="price-chart"></canvas>
                    </div>
                </div>

                <!-- Options Recommendation -->
                <div class="bg-zinc-900 rounded-3xl p-8 mb-10">
                    <h3 class="text-xl font-semibold mb-6">📌 Grok Options Play</h3>
                    <div id="options-recommendation" class="flex gap-6"></div>
                </div>

                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Latest News</h3>
                        <div id="news-feed" class="space-y-6 text-zinc-400">Loading news...</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Key Metrics & Global Impact</h3>
                        <div id="metrics" class="grid grid-cols-2 gap-6"></div>
                        <div id="global-impact" class="mt-8 bg-black/70 rounded-2xl p-6 text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "d71fb41r01qot5jd7n50d71fb41r01qot5jd7n5g";
        let currentTicker = 'TSLA';
        let currentChart = null;

        const watchlist = ['TSLA', 'AMD', 'AAPL', 'NVDA'];

        async function fetchFinnhub(endpoint) {
            const res = await fetch(`https://finnhub.io/api/v1/${endpoint}&token=${API_KEY}`);
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }

        // Real historical chart data
        async function fetchChartData(ticker, period) {
            let resolution = 'D';
            let days = 30;
            if (period === '3mo') days = 90;
            if (period === '6mo') days = 180;
            if (period === '1y') days = 365;

            const to = Math.floor(Date.now() / 1000);
            const from = to - (days * 86400);

            const data = await fetchFinnhub(`stock/candle?symbol=${ticker}&resolution=${resolution}&from=${from}&to=${to}`);
            if (data.s === 'no_data') throw new Error('No data');

            const dates = data.t.map(ts => new Date(ts * 1000).toLocaleDateString('en-US', {month:'short', day:'numeric'}));
            return { dates, closes: data.c };
        }

        async function renderChart(ticker, period) {
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById('price-chart');
            document.getElementById('price-chart').innerHTML = '<div class="text-center py-20 text-zinc-400">Loading chart...</div>';

            try {
                const data = await fetchChartData(ticker, period);
                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.dates,
                        datasets: [{
                            label: ticker + ' Price',
                            data: data.closes,
                            borderColor: '#10b981',
                            borderWidth: 3,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { grid: { color: '#27272a' } }, y: { grid: { color: '#27272a' } } }
                    }
                });
            } catch(e) {
                ctx.innerHTML = '<div class="text-center py-20 text-red-400">Chart data temporarily unavailable</div>';
            }
        }

        async function renderWatchlist() {
            const container = document.getElementById('stock-list');
            container.innerHTML = '';
            for (let ticker of watchlist) {
                try {
                    const quote = await fetchFinnhub(`quote?symbol=${ticker}`);
                    const changePct = quote.dp || 0;
                    const isUp = changePct >= 0;
                    const html = `
                    <div onclick="selectStock('${ticker}')" class="bg-zinc-900 border ${isUp ? 'border-emerald-500' : 'border-red-500'} rounded-3xl p-5 cursor-pointer">
                        <div class="flex justify-between"><div><strong>${ticker}</strong></div>
                        <div class="text-right"><div class="font-semibold">$${quote.c.toFixed(2)}</div>
                        <div class="${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? '↑' : '↓'} ${changePct.toFixed(2)}%</div></div></div></div>`;
                    container.innerHTML += html;
                } catch(e) {}
            }
        }

        async function selectStock(ticker) {
            currentTicker = ticker;
            document.getElementById('stock-ticker').textContent = ticker;
            document.getElementById('stock-name').textContent = ticker;

            const quote = await fetchFinnhub(`quote?symbol=${ticker}`);
            document.getElementById('current-price').innerHTML = `$${quote.c.toFixed(2)}`;
            const isUp = quote.dp >= 0;
            document.getElementById('price-change').innerHTML = `<span class="${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? '▲' : '▼'} ${quote.dp.toFixed(2)}%</span>`;

            renderRecommendation(ticker, quote);
            renderOptionsRecommendation(ticker, quote);
            renderMetrics(quote);
            renderGlobalImpact(ticker);
            renderChart(ticker, '1mo');   // default 1 month
        }

        function renderRecommendation(ticker, quote) {
            const change = quote.dp || 0;
            let rec = "HOLD";
            let conf = 70;
            let color = "rec-hold";
            let reason = "Sideways action. Solid long-term story.";

            if (change > 2) { rec = "STRONG BUY"; conf = 88; color = "rec-buy"; reason = "Very strong momentum today."; }
            else if (change > 0.5) { rec = "BUY"; conf = 80; color = "rec-buy"; reason = "Positive short-term trend."; }
            else if (change < -2) { rec = "SELL"; conf = 75; color = "rec-sell"; reason = "Recent weakness detected."; }

            const card = document.getElementById('recommendation-card');
            card.className = `w-96 rounded-3xl p-7 text-black shadow-2xl ${color}`;
            document.getElementById('rec-badge').innerHTML = rec;
            document.getElementById('rec-confidence').innerHTML = `${conf}%`;
            document.getElementById('rec-reason').innerHTML = reason;
        }

        function renderOptionsRecommendation(ticker, quote) {
            const change = quote.dp || 0;
            let callPut = "NEUTRAL";
            let confidence = 65;
            let reason = "Waiting for clearer direction.";

            if (change > 1.5) {
                callPut = "BUY CALLS";
                confidence = 82;
                reason = `Strong upward momentum. Bullish bias – Calls have high probability of profit.`;
            } else if (change < -1.5) {
                callPut = "BUY PUTS";
                confidence = 78;
                reason = `Bearish pressure detected. Puts are attractive for short-term downside protection.`;
            }

            document.getElementById('options-recommendation').innerHTML = `
                <div class="flex-1 bg-black rounded-3xl p-6">
                    <div class="text-emerald-400 text-xl font-bold">${callPut}</div>
                    <div class="text-4xl font-bold mt-2">${confidence}% Confidence</div>
                    <p class="text-zinc-300 mt-4">${reason}</p>
                </div>
            `;
        }

        function renderMetrics(quote) { /* same as before */ 
            document.getElementById('metrics').innerHTML = `
                <div class="bg-black rounded-2xl p-5"><div class="text-xs text-zinc-400">OPEN</div><div class="text-2xl">$${quote.o?.toFixed(2)||'N/A'}</div></div>
                <div class="bg-black rounded-2xl p-5"><div class="text-xs text-zinc-400">HIGH</div><div class="text-2xl">$${quote.h?.toFixed(2)||'N/A'}</div></div>
                <div class="bg-black rounded-2xl p-5"><div class="text-xs text-zinc-400">LOW</div><div class="text-2xl">$${quote.l?.toFixed(2)||'N/A'}</div></div>
                <div class="bg-black rounded-2xl p-5"><div class="text-xs text-zinc-400">PREV CLOSE</div><div class="text-2xl">$${quote.pc?.toFixed(2)||'N/A'}</div></div>
            `;
        }

        function renderGlobalImpact(ticker) { /* same as before */ 
            const impacts = { TSLA: "EV subsidies, China competition, interest rates", AMD: "AI chips + US-China tensions", AAPL: "China sales + iPhone cycle", NVDA: "AI spending + export restrictions" };
            document.getElementById('global-impact').innerHTML = `<strong>Global factors affecting ${ticker}:</strong><br>${impacts[ticker]}`;
        }

        function changePeriod(btn, period) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active', 'bg-emerald-950'));
            btn.classList.add('active', 'bg-emerald-950');
            renderChart(currentTicker, period);
        }

        async function refreshAll() {
            await renderWatchlist();
            await selectStock(currentTicker);
        }

        window.onload = () => {
            renderWatchlist();
            selectStock('TSLA');
        };
    </script>
</body>
</html>
