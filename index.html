<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Stock Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .chart-container { position: relative; height: 420px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-screen-2xl mx-auto">
        <nav class="bg-black border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">📈</div>
                <h1 class="title-font text-4xl tracking-tighter font-semibold">Grok Stock Analyzer</h1>
            </div>
            <button onclick="refreshAll()" class="bg-zinc-900 hover:bg-emerald-600 px-6 py-3 rounded-3xl text-sm font-medium">Refresh All</button>
        </nav>

        <div class="flex">
            <!-- Sidebar -->
            <div class="w-80 bg-black border-r border-zinc-800 min-h-screen p-8">
                <h2 class="uppercase text-xs tracking-widest text-zinc-500 mb-4">Watchlist</h2>
                <div id="stock-list" class="space-y-3"></div>

                <div class="mt-12">
                    <h3 class="text-sm text-zinc-400 mb-3">Search Ticker</h3>
                    <div class="flex gap-2">
                        <input id="ticker-input" type="text" placeholder="TSLA, AAPL, MSFT..." 
                               class="flex-1 bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-3 text-white focus:border-emerald-500 outline-none">
                        <button onclick="loadCustomTicker()" class="bg-emerald-600 hover:bg-emerald-500 px-6 rounded-3xl">Load</button>
                    </div>
                </div>
            </div>

            <!-- Main Area -->
            <div class="flex-1 p-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <div class="flex items-center gap-4">
                            <h1 id="stock-name" class="title-font text-6xl font-bold text-white">TSLA</h1>
                            <span id="stock-ticker" class="text-4xl font-mono text-zinc-400"></span>
                        </div>
                        <div id="current-price" class="text-6xl font-semibold mt-2"></div>
                        <div id="price-change" class="text-3xl mt-1"></div>
                    </div>

                    <div id="recommendation-card" class="w-80 rounded-3xl p-6 text-black">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Chart -->
                <div class="bg-zinc-900 rounded-3xl p-8 mb-10">
                    <div class="flex justify-between mb-6">
                        <h3 class="text-xl font-semibold">Price Chart</h3>
                        <div class="flex gap-3">
                            <button onclick="changePeriod(this, '1mo')" class="period-btn active px-4 py-1.5 rounded-3xl bg-emerald-600 text-sm">1M</button>
                            <button onclick="changePeriod(this, '3mo')" class="period-btn px-4 py-1.5 rounded-3xl hover:bg-zinc-800 text-sm">3M</button>
                            <button onclick="changePeriod(this, '6mo')" class="period-btn px-4 py-1.5 rounded-3xl hover:bg-zinc-800 text-sm">6M</button>
                            <button onclick="changePeriod(this, '1y')" class="period-btn px-4 py-1.5 rounded-3xl hover:bg-zinc-800 text-sm">1Y</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="price-chart"></canvas>
                    </div>
                    <div id="chart-status" class="text-center text-amber-400 text-sm mt-4 hidden"></div>
                </div>

                <!-- Simple Status -->
                <div class="text-xs text-zinc-500 text-center">
                    If the chart is still blank, try clicking "Refresh All" or search for another ticker like MSFT or NVDA.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "d71t3uhr01qpd27969agd71t3uhr01qpd27969b0";

        let currentTicker = "TSLA";
        let currentChart = null;

        const watchlist = ["TSLA", "AMD", "AAPL", "NVDA"];

        async function fetchWithDelay(url) {
            await new Promise(r => setTimeout(r, 400)); // Prevent rate limit
            const res = await fetch(url);
            if (!res.ok) throw new Error("API failed");
            return res.json();
        }

        async function renderWatchlist() {
            const container = document.getElementById("stock-list");
            container.innerHTML = "";
            for (let t of watchlist) {
                try {
                    const q = await fetchWithDelay(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${API_KEY}`);
                    const change = q.dp || 0;
                    const isUp = change >= 0;
                    container.innerHTML += `
                        <div onclick="selectStock('${t}')" class="bg-zinc-900 border ${isUp ? 'border-emerald-500' : 'border-red-500'} rounded-3xl p-4 cursor-pointer flex justify-between">
                            <div class="font-semibold">${t}</div>
                            <div class="text-right">
                                <div>$${q.c.toFixed(2)}</div>
                                <div class="${isUp ? 'text-emerald-400' : 'text-red-400'} text-sm">${isUp ? '↑' : '↓'} ${change.toFixed(2)}%</div>
                            </div>
                        </div>`;
                } catch(e) {}
            }
        }

        async function selectStock(ticker) {
            currentTicker = ticker.toUpperCase();
            document.getElementById("stock-ticker").textContent = currentTicker;
            document.getElementById("stock-name").textContent = currentTicker;

            try {
                const quote = await fetchWithDelay(`https://finnhub.io/api/v1/quote?symbol=${currentTicker}&token=${API_KEY}`);
                
                document.getElementById("current-price").innerHTML = `$${quote.c.toFixed(2)}`;
                const isUp = quote.dp >= 0;
                document.getElementById("price-change").innerHTML = `
                    <span class="${isUp ? 'text-emerald-400' : 'text-red-400'}">
                        ${isUp ? '▲' : '▼'} ${quote.dp.toFixed(2)}%
                    </span>`;

                // Simple recommendation
                const card = document.getElementById("recommendation-card");
                let recText = quote.dp > 1 ? "BUY" : "HOLD";
                let color = quote.dp > 1 ? "bg-emerald-500" : "bg-amber-400";
                card.innerHTML = `
                    <div class="flex justify-between mb-3">
                        <div class="uppercase text-xs font-bold">GROK RECOMMENDATION</div>
                        <div class="${color} text-black px-4 py-1 rounded-3xl text-sm font-bold">${recText}</div>
                    </div>
                    <div class="text-5xl font-bold">${Math.abs(quote.dp * 10).toFixed(0)}% Confidence</div>
                    <p class="mt-3 text-sm">${quote.dp > 0 ? "Positive momentum" : "Sideways / cautious"}</p>
                `;

                // Render real chart
                renderChart(currentTicker, "1mo");

            } catch(e) {
                alert("Failed to load " + currentTicker + ". Your API key may have reached limit or is invalid.");
            }
        }

        async function renderChart(ticker, period) {
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById("price-chart");
            const status = document.getElementById("chart-status");
            status.classList.add("hidden");

            try {
                let days = period === "1mo" ? 30 : period === "3mo" ? 90 : period === "6mo" ? 180 : 365;
                const to = Math.floor(Date.now() / 1000);
                const from = to - (days * 86400);

                const data = await fetchWithDelay(`https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=D&from=${from}&to=${to}&token=${API_KEY}`);

                if (data.s === "no_data" || !data.c || data.c.length < 2) {
                    throw new Error("no data");
                }

                const dates = data.t.map(ts => new Date(ts*1000).toLocaleDateString('en-US', {month:'short', day:'numeric'}));

                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            label: ticker,
                            data: data.c,
                            borderColor: '#10b981',
                            borderWidth: 3,
                            tension: 0.3,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: '#27272a' } },
                            y: { grid: { color: '#27272a' } }
                        }
                    }
                });
            } catch(e) {
                status.textContent = "Chart data not available right now. Try Refresh All or another ticker.";
                status.classList.remove("hidden");
            }
        }

        function changePeriod(btn, period) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active', 'bg-emerald-600'));
            btn.classList.add('active', 'bg-emerald-600');
            renderChart(currentTicker, period);
        }

        function loadCustomTicker() {
            let val = document.getElementById("ticker-input").value.trim().toUpperCase();
            if (val) selectStock(val);
        }

        async function refreshAll() {
            await renderWatchlist();
            await selectStock(currentTicker);
        }

        // Start
        window.onload = () => {
            renderWatchlist();
            selectStock("TSLA");
        };
    </script>
</body>
</html>
